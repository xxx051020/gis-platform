<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIS 数据展示平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.1.0/ol.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; }
        .toolbar {
            display: flex; gap: 12px; padding: 10px 16px;
            background: #1a1a2e; color: #fff; align-items: center;
        }
        .toolbar h1 { font-size: 18px; margin-right: auto; }
        .toolbar button {
            padding: 6px 16px; border: none; border-radius: 4px;
            cursor: pointer; font-size: 14px;
        }
        .btn-leaflet { background: #4caf50; color: #fff; }
        .btn-openlayers { background: #2196f3; color: #fff; }
        .btn-leaflet.active, .btn-openlayers.active { outline: 3px solid #ffeb3b; }
        .map-container { display: flex; height: calc(100vh - 52px); }
        #leafletMap, #openlayersMap { flex: 1; }
        .hidden { display: none !important; }
        .panel {
            width: 300px; background: #f5f5f5; padding: 16px;
            overflow-y: auto; border-left: 2px solid #ddd;
        }
        .panel h3 { margin-bottom: 12px; }
        .panel input, .panel select, .panel textarea {
            width: 100%; padding: 6px 8px; margin-bottom: 8px;
            border: 1px solid #ccc; border-radius: 4px;
        }
        .panel button { width: 100%; padding: 8px; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="toolbar">
        <h1>🌍 GIS 数据展示平台</h1>
        <button id="btnLeaflet" class="btn-leaflet active" onclick="switchMap('leaflet')">Leaflet</button>
        <button id="btnOpenlayers" class="btn-openlayers" onclick="switchMap('openlayers')">OpenLayers</button>
    </div>
    <div class="map-container">
        <div id="leafletMap"></div>
        <div id="openlayersMap" class="hidden"></div>
        <div class="panel">
            <h3>📍 添加 POI</h3>
            <input type="text" id="poiName" placeholder="名称（如：广州塔）">
            <select id="poiCategory">
                <option value="landmark">地标</option>
                <option value="restaurant">餐饮</option>
                <option value="park">公园</option>
                <option value="transport">交通</option>
            </select>
            <textarea id="poiDesc" placeholder="描述（可选）" rows="2"></textarea>
            <input type="number" id="poiLng" placeholder="经度（如：113.3245）" step="0.0001">
            <input type="number" id="poiLat" placeholder="纬度（如：23.1095）" step="0.0001">
            <button onclick="addPOI()" style="background:#1a1a2e;color:#fff;">添加 POI</button>
            <hr style="margin:16px 0;">
            <button onclick="loadPOIs()" style="background:#ff9800;color:#fff;">加载所有 POI</button>
            <button onclick="clearPOIs()" style="background:#f44336;color:#fff;margin-top:4px;">清除标记</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ol@v10.1.0/dist/ol.js"></script>
    <script>
        const API_BASE = "http://localhost:8000";
        let currentMap = "leaflet";

        // --- Leaflet ---
        const leafletMap = L.map("leafletMap").setView([23.1291, 113.2644], 12);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: "&copy; OpenStreetMap"
        }).addTo(leafletMap);
        let leafletLayer = L.layerGroup().addTo(leafletMap);

        // --- OpenLayers ---
        const olMap = new ol.Map({
            target: "openlayersMap",
            layers: [
                new ol.layer.Tile({
                    source: new ol.source.OSM()
                })
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([113.2644, 23.1291]),
                zoom: 12
            })
        });
        let olVectorSource = new ol.source.Vector();
        let olVectorLayer = new ol.layer.Vector({ source: olVectorSource });
        olMap.addLayer(olVectorLayer);

        function switchMap(type) {
            currentMap = type;
            document.getElementById("leafletMap").classList.toggle("hidden", type !== "leaflet");
            document.getElementById("openlayersMap").classList.toggle("hidden", type !== "openlayers");
            document.getElementById("btnLeaflet").classList.toggle("active", type === "leaflet");
            document.getElementById("btnOpenlayers").classList.toggle("active", type === "openlayers");
            if (type === "openlayers") olMap.updateSize();
            if (type === "leaflet") leafletMap.invalidateSize();
        }

        async function loadPOIs() {
            try {
                const res = await fetch(${API_BASE}/api/pois/geojson);
                const geojson = await res.json();
                clearPOIs();
                geojson.features.forEach(f => {
                    const [lng, lat] = f.geometry.coordinates;
                    const label = ${f.properties.name} [];
                    // Leaflet
                    L.marker([lat, lng])
                        .bindPopup(<b></b><br>)
                        .addTo(leafletLayer);
                    // OpenLayers
                    const feat = new ol.Feature({
                        geometry: new ol.geom.Point(ol.proj.fromLonLat([lng, lat])),
                        name: label
                    });
                    olVectorSource.addFeature(feat);
                });
            } catch (e) {
                alert("加载失败：" + e.message);
            }
        }

        function clearPOIs() {
            leafletLayer.clearLayers();
            olVectorSource.clear();
        }

        async function addPOI() {
            const name = document.getElementById("poiName").value;
            const category = document.getElementById("poiCategory").value;
            const description = document.getElementById("poiDesc").value;
            const lng = parseFloat(document.getElementById("poiLng").value);
            const lat = parseFloat(document.getElementById("poiLat").value);
            if (!name || isNaN(lng) || isNaN(lat)) {
                alert("请填写名称、经纬度");
                return;
            }
            try {
                const res = await fetch(${API_BASE}/api/pois, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, category, description, lng, lat })
                });
                if (res.ok) {
                    alert("添加成功！");
                    loadPOIs();
                } else {
                    alert("添加失败");
                }
            } catch (e) {
                alert("请求失败：" + e.message);
            }
        }
    </script>
</body>
</html>
